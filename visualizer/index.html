<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Network</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0a; }
    #graph { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="graph"></div>
  <script>
    const raw = __TOPOLOGY__;

    const bootstrapSet = new Set(raw.bootstrap_nodes);

    const nodes = new vis.DataSet(
      [...raw.bootstrap_nodes, ...raw.nodes].map(id => ({
        id,
        label: id.slice(0, 8),
        color: bootstrapSet.has(id)
          ? { background: '#e53935', border: '#b71c1c' }
          : { background: '#4fc3f7', border: '#0288d1' },
        size: bootstrapSet.has(id) ? 16 : 12
      }))
    );

    const edges = new vis.DataSet(
      raw.edges.map(([from, to]) => ({ from, to }))
    );

    const network = new vis.Network(
      document.getElementById('graph'),
      { nodes, edges },
      {
        physics: {
          solver: 'forceAtlas2Based',
          stabilization: { iterations: 150 }
        },
        nodes: {
          shape: 'dot',
          font: { size: 11, color: '#ccc' }
        },
        edges: {
          color: { color: '#555', opacity: 0.5 },
          smooth: { type: 'continuous' }
        }
      }
    );

    network.on('stabilized', () => {
    network.setOptions({ physics: false });
    });

</script>
</body>
</html>
