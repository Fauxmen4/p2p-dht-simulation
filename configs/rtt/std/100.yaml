seed: 42
kademlia:
  bit_size: 160
  k:        20
  alpha:    3
  beta:     3
network:
  nodes_count:     100
  bootstrap_count: 5
  bootstrap_conns: 2
  only_bootstrap_join: true
  drop_rate:       0
workload:
  steps: 100
  store: true
  lookups_per_store: 5

latency:
  area_size:       85.0   # размер 2D-сетки в мс (макс. ~120 мс RTT между краями)
  server_fraction: 0.3    # 30% узлов — серверы с малой last-mile задержкой
  server_mean:     0.5    # средняя last-mile задержка сервера, мс
  server_std:      0.3
  home_mean:       6.0    # средняя last-mile задержка домашнего узла, мс
  home_std:        3.5
  min_height:      0.1